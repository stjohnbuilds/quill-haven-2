<!DOCTYPE html>
<!-- THE HOME PAGE = a backdrop only. Wallpaper + logo. NOTHING to click.
     The bar, dock and settings are the ONE shell, drawn by the extension on
     every page (this one included). data-qh-home only tells the shell "this is
     home" so it can remember the way back. -->
<html lang="en" data-qh-home="1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quill Haven</title>
  <link rel="stylesheet" href="css/home.css?v=7">
  <!-- Hold the page invisible until its styles + logo font are ready, then fade in —
       so boot never flashes the raw, unstyled name/tagline. -->
  <style>body{opacity:0}body.qh-ready{opacity:1;transition:opacity .45s ease}</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="stage">
    <div class="logo-wrap">
      <span class="logo">Quill<span class="haven">Haven</span></span>
      <span class="logo-quill" role="img" aria-label="Quill"></span>
    </div>
    <div class="tagline">a quiet place to write</div>
  </main>
  <script>
    (function () {
      function go() { document.body.classList.add('qh-ready'); }
      if (document.fonts && document.fonts.ready) { document.fonts.ready.then(go); }
      addEventListener('load', go);
      setTimeout(go, 1200); // fallback so it always reveals
    })();
  </script>
</body>
</html>
